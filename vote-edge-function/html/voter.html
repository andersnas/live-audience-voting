<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Vote</title>
  <link rel="stylesheet" href="__BASE__/styles.css">
</head>
<body>
  <div class="vote-wrap">
    <div class="vote-card">
      <div id="vote-screen">
        <div class="eyebrow">Live Poll</div>
        <h1 id="question-text">Which backend language do you use?</h1>
        <div class="options">
          <button class="opt-btn" data-option="A" onclick="vote('A')"><span class="btn-key">A</span><span id="label-A">Java</span></button>
          <button class="opt-btn" data-option="B" onclick="vote('B')"><span class="btn-key">B</span><span id="label-B">C#</span></button>
          <button class="opt-btn" data-option="C" onclick="vote('C')"><span class="btn-key">C</span><span id="label-C">NodeJS</span></button>
          <button class="opt-btn" data-option="D" onclick="vote('D')"><span class="btn-key">D</span><span id="label-D">Other</span></button>
        </div>
        <div class="vote-error" id="error">Something went wrong. Please try again.</div>
      </div>
      <div class="confirm-wrap" id="confirmation" style="display:none">
        <div class="confirm-icon">✓</div>
        <p>You voted for</p>
        <strong id="voted-option"></strong>
      </div>
    </div>
  </div>
  <script>
    const BASE = '__BASE__';
    function getToken(){let t=sessionStorage.getItem('vt');if(!t){t=Math.random().toString(36).substring(2)+Date.now().toString(36);sessionStorage.setItem('vt',t);}return t;}
    async function vote(option){
      document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
      document.getElementById('error').style.display='none';
      try{
        const res=await fetch(BASE+'/api/vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({option,token:getToken()})});
        if(res.ok){
          const label=document.getElementById('label-'+option)?.textContent||'Option '+option;
          document.getElementById('vote-screen').style.display='none';
          document.getElementById('voted-option').textContent=label;
          document.getElementById('confirmation').style.display='block';
        }else{throw new Error();}
      }catch{
        document.getElementById('error').style.display='block';
        document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=false);
      }
    }
  </script>
</body>
</html>
