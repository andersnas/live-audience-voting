<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Vote</title>
  <link rel="stylesheet" href="__BASE__/styles.css">
</head>
<body>
  <div class="vote-wrap">
    <div class="vote-card">

      <!-- Email registration screen -->
      <div id="email-screen">
        <div class="eyebrow">Live Poll</div>
        <h1>__SET_NAME__</h1>
        <form onsubmit="register(event)">
          <input type="email" id="email-input" class="email-input" placeholder="you@example.com" required autocomplete="email" />
          <button type="submit" class="join-btn" id="join-btn">Join</button>
        </form>
        <div class="vote-error" id="email-error"></div>
      </div>

      <!-- Vote screen (dynamic question) -->
      <div id="vote-screen" style="display:none">
        <div class="eyebrow">Live Poll</div>
        <h1 id="question-text"></h1>
        <div class="options" id="options-container"></div>
        <div class="vote-error" id="vote-error"></div>
      </div>

      <!-- Waiting screen (no active question) -->
      <div id="waiting-screen" style="display:none">
        <div class="eyebrow">Live Poll</div>
        <h1>Waiting for the next question...</h1>
        <div class="pulse-indicator"></div>
        <p class="waiting-hint">The presenter will activate a question shortly.</p>
      </div>

      <!-- Voted confirmation + waiting for next -->
      <div id="voted-screen" style="display:none">
        <div class="confirm-wrap">
          <div class="confirm-icon">✓</div>
          <p>You voted for</p>
          <strong id="voted-option"></strong>
          <div class="voted-waiting">
            <div class="pulse-indicator pulse-small"></div>
            <p class="waiting-hint">Waiting for the next question...</p>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script>
    const BASE = '__BASE__';
    const SET_ID = '__SET_ID__';
    let jwt = sessionStorage.getItem('jwt_' + SET_ID);
    let currentQuestionId = null;
    let pollTimer = null;

    function votedKey(qId) { return 'voted_' + SET_ID + '_' + qId; }

    // --- State machine ---

    function showScreen(id) {
      ['email-screen', 'vote-screen', 'waiting-screen', 'voted-screen'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
    }

    function applyState(data) {
      if (!data || !data.question) {
        // No active question → WAITING
        currentQuestionId = null;
        showScreen('waiting-screen');
        return;
      }

      const qId = data.question.id;
      let votedLabel = sessionStorage.getItem(votedKey(qId));

      // If votes were cleared (total is 0), allow re-voting
      if (votedLabel && data.total === 0) {
        sessionStorage.removeItem(votedKey(qId));
        votedLabel = null;
      }

      if (votedLabel) {
        // Already voted on this question → VOTED
        currentQuestionId = qId;
        document.getElementById('voted-option').textContent = votedLabel;
        showScreen('voted-screen');
      } else {
        // New question, not voted → VOTE
        currentQuestionId = qId;
        renderQuestion(data.question);
        showScreen('vote-screen');
      }
    }

    // --- Init ---

    if (jwt) {
      showScreen('waiting-screen');
      fetchAndApply();
      startPolling();
    }

    // --- Registration ---

    async function register(e) {
      e.preventDefault();
      const email = document.getElementById('email-input').value.trim();
      const btn = document.getElementById('join-btn');
      const err = document.getElementById('email-error');
      btn.disabled = true;
      err.style.display = 'none';
      try {
        const res = await fetch(BASE + '/api/voter/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, setId: SET_ID })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        jwt = data.jwt;
        sessionStorage.setItem('jwt_' + SET_ID, jwt);
        applyState(data);
        startPolling();
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
      }
    }

    // --- Polling ---

    function startPolling() {
      if (pollTimer) return;
      pollTimer = setInterval(fetchAndApply, 3000);
    }

    async function fetchAndApply() {
      try {
        const res = await fetch(BASE + '/api/question?set=' + encodeURIComponent(SET_ID), {
          headers: { 'Authorization': 'Bearer ' + jwt }
        });
        if (res.status === 401) return; // JWT expired, stay on current screen
        const data = await res.json();
        applyState(data);
      } catch {}
    }

    // --- Render + Vote ---

    function renderQuestion(question) {
      document.getElementById('question-text').textContent = question.label;
      const container = document.getElementById('options-container');
      container.innerHTML = '';
      question.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.setAttribute('data-option', opt.key);
        btn.onclick = () => vote(opt.key, opt.label);
        btn.innerHTML = '<span class="btn-key">' + opt.key + '</span><span>' + opt.label + '</span>';
        container.appendChild(btn);
      });
    }

    async function vote(option, label) {
      document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
      document.getElementById('vote-error').style.display = 'none';
      try {
        const res = await fetch(BASE + '/api/vote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt },
          body: JSON.stringify({ option, setId: SET_ID })
        });
        const data = await res.json();
        if (res.ok) {
          sessionStorage.setItem(votedKey(currentQuestionId), label);
          document.getElementById('voted-option').textContent = label;
          showScreen('voted-screen');
        } else {
          throw new Error(data.error || 'Vote failed');
        }
      } catch (ex) {
        const err = document.getElementById('vote-error');
        err.textContent = ex.message;
        err.style.display = 'block';
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = false);
      }
    }
  </script>
</body>
</html>
