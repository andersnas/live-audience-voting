<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vote Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #002f6c;
      --bg-card: #003d8a;
      --bg-surface: rgba(255,255,255,0.05);
      --btn-a: #a64c7a;
      --btn-b: #04cd63;
      --btn-c: #00a3eb;
      --btn-d: #7a7cff;
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.5);
      --border: rgba(255,255,255,0.08);
      --radius: 14px;
      --green: #04cd63;
      --red: #ff4d6d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse at 10% 10%, rgba(0,163,235,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(122,124,255,0.1) 0%, transparent 50%);
    }
    .header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    h1 { font-size: 1.6rem; font-weight: 700; }
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--btn-c);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      max-width: 700px;
      margin-bottom: 1.5rem;
    }
    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 1.25rem;
      text-align: center;
      border: 1px solid var(--border);
    }
    .card .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .card .count { font-size: 2.5rem; font-weight: 700; line-height: 1; }
    .card .pct { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.35rem; }
    .card[data-option="A"] .count { color: var(--btn-a); }
    .card[data-option="B"] .count { color: var(--btn-b); }
    .card[data-option="C"] .count { color: var(--btn-c); }
    .card[data-option="D"] .count { color: var(--btn-d); }
    .total {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
      max-width: 700px;
    }
    .total strong { color: var(--text); }
    .bars { max-width: 700px; margin-bottom: 2rem; }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
    }
    .bar-lbl {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }
    .bar-track {
      flex: 1;
      background: var(--bg-surface);
      border-radius: 6px;
      height: 24px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .bar-fill[data-option="A"] { background: var(--btn-a); }
    .bar-fill[data-option="B"] { background: var(--btn-b); }
    .bar-fill[data-option="C"] { background: var(--btn-c); }
    .bar-fill[data-option="D"] { background: var(--btn-d); }
    .bar-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }
    .actions { display: flex; gap: 0.75rem; max-width: 700px; flex-wrap: wrap; margin-bottom: 1rem; }
    .btn {
      padding: 0.65rem 1.25rem;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn:active { transform: scale(0.97); }
    .btn-clear { background: var(--red); color: #fff; }
    .btn-refresh { background: var(--bg-surface); color: var(--text); border: 1px solid var(--border); }
    .btn:hover { opacity: 0.85; }
    .status {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      height: 1.2rem;
    }
    .status.ok { color: var(--green); }
    .status.err { color: var(--red); }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="eyebrow">Control Panel</div>
      <h1>Vote Admin</h1>
    </div>
  </div>

  <div class="grid">
    <div class="card" data-option="A"><div class="label">A — Java</div><div class="count" id="count-A">0</div><div class="pct" id="pct-A">0%</div></div>
    <div class="card" data-option="B"><div class="label">B — C#</div><div class="count" id="count-B">0</div><div class="pct" id="pct-B">0%</div></div>
    <div class="card" data-option="C"><div class="label">C — NodeJS</div><div class="count" id="count-C">0</div><div class="pct" id="pct-C">0%</div></div>
    <div class="card" data-option="D"><div class="label">D — Other</div><div class="count" id="count-D">0</div><div class="pct" id="pct-D">0%</div></div>
  </div>

  <div class="total">Total votes: <strong id="total">0</strong></div>

  <div class="bars">
    <div class="bar-row"><span class="bar-lbl">A</span><div class="bar-track"><div class="bar-fill" data-option="A" id="bar-A" style="width:0%"></div></div><span class="bar-count" id="bar-count-A">0</span></div>
    <div class="bar-row"><span class="bar-lbl">B</span><div class="bar-track"><div class="bar-fill" data-option="B" id="bar-B" style="width:0%"></div></div><span class="bar-count" id="bar-count-B">0</span></div>
    <div class="bar-row"><span class="bar-lbl">C</span><div class="bar-track"><div class="bar-fill" data-option="C" id="bar-C" style="width:0%"></div></div><span class="bar-count" id="bar-count-C">0</span></div>
    <div class="bar-row"><span class="bar-lbl">D</span><div class="bar-track"><div class="bar-fill" data-option="D" id="bar-D" style="width:0%"></div></div><span class="bar-count" id="bar-count-D">0</span></div>
  </div>

  <div class="actions">
    <button class="btn btn-refresh" onclick="fetchTotals()">↻ Refresh</button>
    <button class="btn btn-clear" onclick="clearVotes()">✕ Clear all votes</button>
  </div>
  <div class="status" id="status"></div>

  <script>
    const ORIGIN = '__ORIGIN_URL__';
    function updateUI(totals, total) {
      ['A','B','C','D'].forEach(o => {
        const count = totals[o] || 0;
        const pct = total > 0 ? Math.round(count / total * 100) : 0;
        document.getElementById('count-' + o).textContent = count;
        document.getElementById('pct-' + o).textContent = pct + '%';
        document.getElementById('bar-' + o).style.width = pct + '%';
        document.getElementById('bar-count-' + o).textContent = count;
      });
      document.getElementById('total').textContent = total;
    }
    async function fetchTotals() {
      try {
        const res = await fetch(ORIGIN + '/api/totals');
        const data = await res.json();
        updateUI(data.totals, data.total);
        setStatus('Updated', 'ok');
      } catch { setStatus('Failed to fetch totals', 'err'); }
    }
    async function clearVotes() {
      if (!confirm('Clear all votes and voter tokens?')) return;
      try {
        const res = await fetch(ORIGIN + '/api/clear', { method: 'POST' });
        const data = await res.json();
        updateUI({ A:0, B:0, C:0, D:0 }, 0);
        setStatus('Cleared ' + data.cleared + ' voter tokens', 'ok');
      } catch { setStatus('Failed to clear', 'err'); }
    }
    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg; el.className = 'status ' + type;
      setTimeout(() => { el.textContent = ''; el.className = 'status'; }, 3000);
    }
    fetchTotals();
    setInterval(fetchTotals, 5000);
    const es = new EventSource(ORIGIN + '/api/events');
    es.onmessage = (e) => {
      try {
        const ev = JSON.parse(e.data);
        if (ev.reset) { updateUI({ A:0, B:0, C:0, D:0 }, 0); return; }
        if (ev.totals) { updateUI(ev.totals, Object.values(ev.totals).reduce((a,b) => a+b, 0)); return; }
        if (ev.option) fetchTotals();
      } catch {}
    };
  </script>
</body>
</html>
