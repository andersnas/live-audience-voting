<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vote Admin</title>
  <link rel="stylesheet" href="__BASE__/styles.css">
</head>
<body>
  <div class="admin-wrap">

    <!-- Set picker screen -->
    <div id="set-picker" style="display:none">
      <div style="max-width:500px;margin:10vh auto;">
        <div class="eyebrow">Admin</div>
        <h1 style="font-size:1.4rem;margin-bottom:1.5rem;">Choose a session</h1>
        <div id="set-list"></div>
      </div>
    </div>

    <!-- Login screen -->
    <div id="login-screen" style="display:none">
      <div class="vote-card" style="max-width:400px;margin:15vh auto;">
        <div class="eyebrow">Admin Login</div>
        <h1 id="login-title" style="font-size:1.3rem;margin-bottom:1.5rem;">Enter access code</h1>
        <form onsubmit="login(event)">
          <input type="password" id="access-code" class="email-input" placeholder="Access code" required autocomplete="off" />
          <button type="submit" class="join-btn" id="login-btn">Login</button>
        </form>
        <div class="vote-error" id="login-error"></div>
      </div>
    </div>

    <!-- Admin panel -->
    <div id="admin-panel" style="display:none">
      <div class="admin-header">
        <div class="eyebrow">Control Panel</div>
        <h1 id="admin-title">Vote Admin</h1>
        <div class="actions" style="margin-top:0.5rem;">
          <button class="btn btn-deactivate" onclick="copyVoterURL()">🔗 Copy Voter URL</button>
          <button class="btn btn-deactivate" onclick="openDisplay()">📺 Open Display</button>
          <button class="btn btn-deactivate" onclick="logout()">⇄ Switch Session</button>
        </div>
        <div class="set-card-id" id="voter-url" style="margin-top:0.5rem;"></div>
      </div>

      <!-- Active question + vote counts -->
      <div id="active-section">
        <div id="question-label" style="color:var(--muted);font-family:var(--mono);font-size:0.8rem;margin-bottom:1.5rem;"></div>
        <div class="totals-grid" id="totals-grid"></div>
        <div class="vote-total-row">Total votes: <strong id="total">0</strong></div>
        <div class="bars" id="bars-container"></div>
      </div>

      <!-- Question queue -->
      <div class="queue-section">
        <div class="queue-header">Question Queue</div>
        <div id="queue-list"></div>
        <div class="actions" style="margin-top:1rem;">
          <button class="btn btn-deactivate" onclick="activatePrev()">◀ Previous</button>
          <button class="btn btn-activate" onclick="activateNext()">Next ▶</button>
          <button class="btn btn-deactivate" onclick="restartQueue()">↺ Restart</button>
          <button class="btn btn-clear" onclick="clearVotes()">✕ Clear votes</button>
        </div>
      </div>

      <!-- Manage section -->
      <div class="queue-section">
        <div class="queue-header">Manage</div>
        <div class="actions">
          <button class="btn btn-activate" onclick="toggleCreateForm()">+ New Session</button>
          <button class="btn btn-deactivate" onclick="toggleEditForm()">✎ Edit Questions</button>
          <button class="btn btn-clear" onclick="deleteSet()">✕ Delete Session</button>
        </div>

        <!-- Create new set form -->
        <div id="create-form" style="display:none;margin-top:1.5rem;">
          <div class="crud-form">
            <h3 style="font-size:1rem;margin-bottom:1rem;">New Session</h3>
            <input type="text" id="create-name" class="email-input" placeholder="Session name" />
            <input type="password" id="create-code" class="email-input" placeholder="Access code" />
            <div id="create-questions"></div>
            <button class="btn btn-deactivate" onclick="addCreateQuestion()" style="margin:0.75rem 0;">+ Add Question</button>
            <div class="actions">
              <button class="btn btn-activate" onclick="submitCreate()">Create</button>
              <button class="btn btn-deactivate" onclick="toggleCreateForm()">Cancel</button>
            </div>
            <div class="vote-error" id="create-error"></div>
          </div>
        </div>

        <!-- Edit questions form -->
        <div id="edit-form" style="display:none;margin-top:1.5rem;">
          <div class="crud-form">
            <h3 style="font-size:1rem;margin-bottom:1rem;">Edit Questions</h3>
            <div id="edit-questions"></div>
            <button class="btn btn-deactivate" onclick="addEditQuestion()" style="margin:0.75rem 0;">+ Add Question</button>
            <div class="actions">
              <button class="btn btn-activate" onclick="submitEdit()">Save</button>
              <button class="btn btn-deactivate" onclick="toggleEditForm()">Cancel</button>
            </div>
            <div class="vote-error" id="edit-error"></div>
          </div>
        </div>
      </div>

      <div class="status-msg" id="status"></div>
    </div>

  </div>
  <script>
    const BASE='__BASE__';
    const ORIGIN='__ORIGIN_URL__';
    const INTERNAL_TOKEN='__INTERNAL_TOKEN__';
    const SET_ID='__SET_ID__';
    let jwt = sessionStorage.getItem('admin_jwt_' + SET_ID);
    let options = [];
    let allQuestions = JSON.parse(sessionStorage.getItem('admin_questions_' + SET_ID) || '[]');
    let activeQuestionId = null;
    let doneQuestions = new Set(JSON.parse(sessionStorage.getItem('done_' + SET_ID) || '[]'));

    if (!SET_ID) {
      loadSessions();
    } else if (jwt) {
      showPanel();
    } else {
      document.getElementById('login-screen').style.display = 'block';
    }

    async function loadSessions() {
      document.getElementById('set-picker').style.display = 'block';
      try {
        const res = await fetch(BASE + '/api/sessions');
        const sessions = await res.json();
        const list = document.getElementById('set-list');
        if (!sessions.length) {
          list.innerHTML = '<p style="color:var(--muted)">No sessions found.</p>';
          return;
        }
        list.innerHTML = sessions.map(s => {
          const date = new Date(s.createdAt).toLocaleDateString();
          return `<div class="set-card" onclick="window.location.href=BASE+'/admin/?set=${s.id}'">
            <div class="set-card-name">${s.name}</div>
            <div class="set-card-meta">${s.questionCount} question${s.questionCount !== 1 ? 's' : ''} · Created ${date}</div>
            <div class="set-card-id">${s.id}</div>
          </div>`;
        }).join('');
      } catch {
        document.getElementById('set-list').innerHTML = '<p style="color:var(--red)">Failed to load sessions.</p>';
      }
    }

    async function login(e) {
      e.preventDefault();
      const code = document.getElementById('access-code').value;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      btn.disabled = true;
      err.style.display = 'none';
      try {
        const res = await fetch(BASE + '/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ setId: SET_ID, accessCode: code })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        jwt = data.jwt;
        sessionStorage.setItem('admin_jwt_' + SET_ID, jwt);
        allQuestions = data.questions || [];
        sessionStorage.setItem('admin_questions_' + SET_ID, JSON.stringify(allQuestions));
        showPanel();
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
      }
    }

    function getVoterURL() {
      return window.location.origin + BASE + '/?set=' + SET_ID;
    }

    function openDisplay() {
      window.open(window.location.origin + BASE + '/display/?set=' + SET_ID, '_blank');
    }

    async function copyVoterURL() {
      try {
        await navigator.clipboard.writeText(getVoterURL());
        setStatus('Voter URL copied!', 'ok');
      } catch {
        prompt('Copy this URL:', getVoterURL());
      }
    }

    async function showPanel() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      document.getElementById('voter-url').textContent = getVoterURL();
      await loadQuestion();
      renderQueue();
      connectSSE();
    }

    async function loadQuestion() {
      try {
        const res = await fetch(BASE + '/api/question?set=' + encodeURIComponent(SET_ID), {
          headers: { 'Authorization': 'Bearer ' + jwt }
        });
        if (res.status === 401) return handleExpired();
        const data = await res.json();
        if (data.name) document.getElementById('admin-title').textContent = data.name;
        if (data.questions) allQuestions = data.questions;
        if (data.question) {
          activeQuestionId = data.question.id;
          setActiveUI(data.question, data.totals, data.total);
        } else {
          activeQuestionId = null;
          document.getElementById('question-label').textContent = 'No active question';
          document.getElementById('totals-grid').innerHTML = '';
          document.getElementById('bars-container').innerHTML = '';
          document.getElementById('total').textContent = '0';
        }
      } catch {}
    }

    function setActiveUI(question, totals, total) {
      document.getElementById('question-label').textContent = question.label;
      options = question.options.map(o => o.key);
      renderGrid(question.options);
      renderBars(question.options);
      updateUI(totals || {}, total || 0);
    }

    // --- Question queue ---

    function renderQueue() {
      const list = document.getElementById('queue-list');
      list.innerHTML = allQuestions.map(q => {
        let status, badge;
        if (q.id === activeQuestionId) {
          status = 'active'; badge = 'ACTIVE';
        } else if (doneQuestions.has(q.id)) {
          status = 'done'; badge = 'DONE';
        } else {
          status = 'pending'; badge = 'PENDING';
        }
        const num = parseInt(q.id.replace('q','')) + 1;
        const icon = status === 'active' ? '▶' : status === 'done' ? '✓' : '○';
        return `<div class="queue-item queue-${status}" onclick="activateQuestion('${q.id}')">
          <span class="queue-num">${icon}</span>
          <span class="queue-label"><strong>Q${num}</strong> ${q.label}</span>
          <span class="queue-badge queue-badge-${status}">${badge}</span>
        </div>`;
      }).join('');
    }

    async function activateQuestion(questionId) {
      try {
        const res = await fetch(BASE + '/api/question/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt },
          body: JSON.stringify({ setId: SET_ID, questionId })
        });
        if (res.status === 401) return handleExpired();
        const data = await res.json();
        if (data.ok) {
          // Mark previous as done
          if (activeQuestionId && activeQuestionId !== questionId) {
            doneQuestions.add(activeQuestionId);
            saveDone();
          }
          activeQuestionId = questionId;
          renderQueue();
          setStatus('Activated ' + questionId, 'ok');
        }
      } catch { setStatus('Failed to activate', 'err'); }
    }

    function activateNext() {
      if (allQuestions.length === 0) return setStatus('No questions', 'err');
      const currentIdx = activeQuestionId ? allQuestions.findIndex(q => q.id === activeQuestionId) : -1;
      const nextIdx = currentIdx + 1;
      if (nextIdx < allQuestions.length) {
        activateQuestion(allQuestions[nextIdx].id);
      } else {
        setStatus('Last question reached', 'err');
      }
    }

    function activatePrev() {
      if (allQuestions.length === 0) return setStatus('No questions', 'err');
      const currentIdx = allQuestions.findIndex(q => q.id === activeQuestionId);
      if (currentIdx > 0) {
        activateQuestion(allQuestions[currentIdx - 1].id);
      } else {
        setStatus('Already at first question', 'err');
      }
    }

    async function restartQueue() {
      try {
        const res = await fetch(BASE + '/api/question/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt },
          body: JSON.stringify({ setId: SET_ID, questionId: null })
        });
        if (res.status === 401) return handleExpired();
        doneQuestions.clear();
        saveDone();
        activeQuestionId = null;
        document.getElementById('question-label').textContent = 'No active question';
        document.getElementById('totals-grid').innerHTML = '';
        document.getElementById('bars-container').innerHTML = '';
        document.getElementById('total').textContent = '0';
        renderQueue();
        setStatus('Queue restarted — press Next to begin', 'ok');
      } catch { setStatus('Failed', 'err'); }
    }

    async function deactivate() {
      try {
        const res = await fetch(BASE + '/api/question/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt },
          body: JSON.stringify({ setId: SET_ID, questionId: null })
        });
        if (res.status === 401) return handleExpired();
        if (activeQuestionId) {
          doneQuestions.add(activeQuestionId);
          saveDone();
        }
        activeQuestionId = null;
        document.getElementById('question-label').textContent = 'No active question';
        document.getElementById('totals-grid').innerHTML = '';
        document.getElementById('bars-container').innerHTML = '';
        document.getElementById('total').textContent = '0';
        renderQueue();
        setStatus('Deactivated', 'ok');
      } catch { setStatus('Failed', 'err'); }
    }

    function saveDone() {
      sessionStorage.setItem('done_' + SET_ID, JSON.stringify([...doneQuestions]));
    }

    // --- Vote totals UI ---

    function renderGrid(opts) {
      const grid = document.getElementById('totals-grid');
      grid.style.gridTemplateColumns = `repeat(${opts.length}, 1fr)`;
      grid.innerHTML = opts.map(o =>
        `<div class="total-card" data-option="${o.key}"><div class="tc-label">${o.key} — ${o.label}</div><div class="tc-count" id="count-${o.key}">0</div><div class="tc-pct" id="pct-${o.key}">0%</div></div>`
      ).join('');
    }

    function renderBars(opts) {
      document.getElementById('bars-container').innerHTML = opts.map(o =>
        `<div class="bar-row"><span class="bar-lbl">${o.key}</span><div class="bar-track"><div class="bar-fill" data-option="${o.key}" id="bar-${o.key}" style="width:0%"></div></div><span class="bar-count" id="bar-count-${o.key}">0</span></div>`
      ).join('');
    }

    function updateUI(totals, total) {
      options.forEach(o => {
        const count = totals[o] || 0;
        const pct = total > 0 ? Math.round(count / total * 100) : 0;
        const el = (id) => document.getElementById(id);
        if (el('count-' + o)) el('count-' + o).textContent = count;
        if (el('pct-' + o)) el('pct-' + o).textContent = pct + '%';
        if (el('bar-' + o)) el('bar-' + o).style.width = pct + '%';
        if (el('bar-count-' + o)) el('bar-count-' + o).textContent = count;
      });
      document.getElementById('total').textContent = total;
    }

    async function fetchTotals() {
      try {
        const res = await fetch(BASE + '/api/totals?set=' + encodeURIComponent(SET_ID), {
          headers: { 'Authorization': 'Bearer ' + jwt }
        });
        if (res.status === 401) return handleExpired();
        const data = await res.json();
        updateUI(data.totals || {}, data.total || 0);
        setStatus('Updated', 'ok');
      } catch { setStatus('Failed', 'err'); }
    }

    async function clearVotes() {
      if (!confirm('Clear votes for the active question?')) return;
      try {
        const res = await fetch(BASE + '/api/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt },
          body: JSON.stringify({ setId: SET_ID, questionId: activeQuestionId })
        });
        if (res.status === 401) return handleExpired();
        const data = await res.json();
        const empty = {};
        options.forEach(o => empty[o] = 0);
        updateUI(empty, 0);
        setStatus('Cleared ' + data.cleared + ' tokens', 'ok');
      } catch { setStatus('Failed', 'err'); }
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status-msg ' + type;
      setTimeout(() => { el.textContent = ''; el.className = 'status-msg'; }, 3000);
    }

    function logout() {
      jwt = null;
      sessionStorage.removeItem('admin_jwt_' + SET_ID);
      sessionStorage.removeItem('admin_questions_' + SET_ID);
      sessionStorage.removeItem('done_' + SET_ID);
      window.location.href = BASE + '/admin/';
    }

    function handleExpired() {
      jwt = null;
      sessionStorage.removeItem('admin_jwt_' + SET_ID);
      document.getElementById('admin-panel').style.display = 'none';
      document.getElementById('login-screen').style.display = 'block';
      document.getElementById('login-error').textContent = 'Session expired. Please login again.';
      document.getElementById('login-error').style.display = 'block';
    }

    // --- CRUD ---

    function questionFormHTML(prefix, q, idx) {
      const opts = q ? q.options : [{key:'A',label:''},{key:'B',label:''}];
      return `<div class="crud-question" id="${prefix}-q-${idx}">
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">
          <strong style="font-size:0.85rem;">Q${idx+1}</strong>
          <input type="text" class="email-input" style="margin:0;flex:1;" placeholder="Question text" value="${q ? q.label : ''}" data-field="label" />
          <button class="btn btn-clear" style="padding:0.4rem 0.6rem;font-size:0.75rem;" onclick="removeQuestion('${prefix}',${idx})">✕</button>
        </div>
        <div class="crud-options" id="${prefix}-opts-${idx}">
          ${opts.map((o,oi) => `<div style="display:flex;gap:0.5rem;margin-bottom:0.4rem;">
            <input type="text" class="email-input" style="margin:0;width:3rem;text-align:center;" value="${o.key}" data-field="key" />
            <input type="text" class="email-input" style="margin:0;flex:1;" placeholder="Option label" value="${o.label}" data-field="label" />
            <button class="btn btn-deactivate" style="padding:0.3rem 0.5rem;font-size:0.7rem;" onclick="this.parentElement.remove()">✕</button>
          </div>`).join('')}
        </div>
        <button class="btn btn-deactivate" style="font-size:0.75rem;padding:0.3rem 0.6rem;margin-bottom:1rem;" onclick="addOption('${prefix}',${idx})">+ Option</button>
      </div>`;
    }

    let createQCount = 0;
    function toggleCreateForm() {
      const form = document.getElementById('create-form');
      if (form.style.display === 'none') {
        form.style.display = 'block';
        document.getElementById('edit-form').style.display = 'none';
        createQCount = 0;
        document.getElementById('create-questions').innerHTML = '';
        addCreateQuestion();
      } else {
        form.style.display = 'none';
      }
    }

    function addCreateQuestion() {
      const container = document.getElementById('create-questions');
      container.insertAdjacentHTML('beforeend', questionFormHTML('create', null, createQCount++));
    }

    let editQCount = 0;
    function toggleEditForm() {
      const form = document.getElementById('edit-form');
      if (form.style.display === 'none') {
        form.style.display = 'block';
        document.getElementById('create-form').style.display = 'none';
        document.getElementById('edit-questions').innerHTML = '';
        editQCount = 0;
        allQuestions.forEach(q => {
          document.getElementById('edit-questions').insertAdjacentHTML('beforeend', questionFormHTML('edit', q, editQCount++));
        });
      } else {
        form.style.display = 'none';
      }
    }

    function addEditQuestion() {
      document.getElementById('edit-questions').insertAdjacentHTML('beforeend', questionFormHTML('edit', null, editQCount++));
    }

    function addOption(prefix, qIdx) {
      const container = document.getElementById(prefix + '-opts-' + qIdx);
      const nextKey = String.fromCharCode(65 + container.children.length);
      container.insertAdjacentHTML('beforeend', `<div style="display:flex;gap:0.5rem;margin-bottom:0.4rem;">
        <input type="text" class="email-input" style="margin:0;width:3rem;text-align:center;" value="${nextKey}" data-field="key" />
        <input type="text" class="email-input" style="margin:0;flex:1;" placeholder="Option label" value="" data-field="label" />
        <button class="btn btn-deactivate" style="padding:0.3rem 0.5rem;font-size:0.7rem;" onclick="this.parentElement.remove()">✕</button>
      </div>`);
    }

    function removeQuestion(prefix, idx) {
      const el = document.getElementById(prefix + '-q-' + idx);
      if (el) el.remove();
    }

    function readQuestions(prefix) {
      const questions = [];
      const container = document.getElementById(prefix + '-questions');
      container.querySelectorAll('.crud-question').forEach(qEl => {
        const label = qEl.querySelector('input[data-field="label"]').value.trim();
        const opts = [];
        qEl.querySelector('.crud-options').querySelectorAll('div').forEach(optEl => {
          const key = optEl.querySelector('input[data-field="key"]')?.value.trim();
          const olabel = optEl.querySelector('input[data-field="label"]')?.value.trim();
          if (key && olabel) opts.push({ key, label: olabel });
        });
        if (label && opts.length >= 2) questions.push({ label, options: opts });
      });
      return questions;
    }

    async function submitCreate() {
      const name = document.getElementById('create-name').value.trim();
      const accessCode = document.getElementById('create-code').value;
      const questions = readQuestions('create');
      const err = document.getElementById('create-error');
      err.style.display = 'none';
      if (!name) { err.textContent = 'Name is required'; err.style.display = 'block'; return; }
      if (!accessCode) { err.textContent = 'Access code is required'; err.style.display = 'block'; return; }
      if (!questions.length) { err.textContent = 'At least one question with 2+ options is required'; err.style.display = 'block'; return; }
      try {
        const res = await fetch(BASE + '/api/session/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt },
          body: JSON.stringify({ name, accessCode, questions })
        });
        if (res.status === 401) return handleExpired();
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Create failed');
        toggleCreateForm();
        setStatus('Session "' + data.name + '" created', 'ok');
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
      }
    }

    async function submitEdit() {
      const questions = readQuestions('edit');
      const err = document.getElementById('edit-error');
      err.style.display = 'none';
      if (!questions.length) { err.textContent = 'At least one question with 2+ options is required'; err.style.display = 'block'; return; }
      try {
        const res = await fetch(BASE + '/api/session/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt },
          body: JSON.stringify({ setId: SET_ID, questions })
        });
        if (res.status === 401) return handleExpired();
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Update failed');
        allQuestions = data.questions || allQuestions;
        toggleEditForm();
        renderQueue();
        setStatus('Questions updated', 'ok');
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
      }
    }

    async function deleteSet() {
      if (!confirm('Delete this entire session? This cannot be undone.')) return;
      try {
        const res = await fetch(BASE + '/api/session/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt },
          body: JSON.stringify({ setId: SET_ID })
        });
        if (res.status === 401) return handleExpired();
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Delete failed');
        logout();
      } catch (ex) {
        setStatus(ex.message, 'err');
      }
    }

    // --- SSE ---

    function connectSSE() {
      const es = new EventSource(ORIGIN + '/api/events?set=' + encodeURIComponent(SET_ID) + '&token=' + INTERNAL_TOKEN);
      es.onmessage = (e) => {
        try {
          const ev = JSON.parse(e.data);
          if (ev.type === 'reset') {
            const empty = {};
            options.forEach(o => empty[o] = 0);
            updateUI(empty, 0);
            return;
          }
          if (ev.type === 'activate' && ev.question) {
            if (activeQuestionId && activeQuestionId !== ev.questionId) {
              doneQuestions.add(activeQuestionId);
              saveDone();
            }
            activeQuestionId = ev.questionId;
            setActiveUI(ev.question, ev.totals, ev.total);
            renderQueue();
            return;
          }
          if (ev.type === 'deactivate') {
            if (activeQuestionId) {
              doneQuestions.add(activeQuestionId);
              saveDone();
            }
            activeQuestionId = null;
            document.getElementById('question-label').textContent = 'No active question';
            document.getElementById('totals-grid').innerHTML = '';
            document.getElementById('bars-container').innerHTML = '';
            document.getElementById('total').textContent = '0';
            renderQueue();
            return;
          }
          if (ev.type === 'vote' && ev.totals) {
            updateUI(ev.totals, ev.total || 0);
            return;
          }
          if (ev.totals && !ev.type) {
            updateUI(ev.totals, Object.values(ev.totals).reduce((a, b) => a + b, 0));
          }
        } catch {}
      };
      es.onerror = () => { es.close(); setTimeout(connectSSE, 3000); };
    }
  </script>
</body>
</html>
