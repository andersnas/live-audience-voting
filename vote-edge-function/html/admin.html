<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vote Admin</title>
  <link rel="stylesheet" href="__BASE__/styles.css">
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-header">
      <div class="eyebrow">Control Panel</div>
      <h1>Vote Admin</h1>
    </div>
    <div class="totals-grid">
      <div class="total-card" data-option="A"><div class="tc-label">A — Java</div><div class="tc-count" id="count-A">0</div><div class="tc-pct" id="pct-A">0%</div></div>
      <div class="total-card" data-option="B"><div class="tc-label">B — C#</div><div class="tc-count" id="count-B">0</div><div class="tc-pct" id="pct-B">0%</div></div>
      <div class="total-card" data-option="C"><div class="tc-label">C — NodeJS</div><div class="tc-count" id="count-C">0</div><div class="tc-pct" id="pct-C">0%</div></div>
      <div class="total-card" data-option="D"><div class="tc-label">D — Other</div><div class="tc-count" id="count-D">0</div><div class="tc-pct" id="pct-D">0%</div></div>
    </div>
    <div class="vote-total-row">Total votes: <strong id="total">0</strong></div>
    <div class="bars">
      <div class="bar-row"><span class="bar-lbl">A</span><div class="bar-track"><div class="bar-fill" data-option="A" id="bar-A" style="width:0%"></div></div><span class="bar-count" id="bar-count-A">0</span></div>
      <div class="bar-row"><span class="bar-lbl">B</span><div class="bar-track"><div class="bar-fill" data-option="B" id="bar-B" style="width:0%"></div></div><span class="bar-count" id="bar-count-B">0</span></div>
      <div class="bar-row"><span class="bar-lbl">C</span><div class="bar-track"><div class="bar-fill" data-option="C" id="bar-C" style="width:0%"></div></div><span class="bar-count" id="bar-count-C">0</span></div>
      <div class="bar-row"><span class="bar-lbl">D</span><div class="bar-track"><div class="bar-fill" data-option="D" id="bar-D" style="width:0%"></div></div><span class="bar-count" id="bar-count-D">0</span></div>
    </div>
    <div class="actions">
      <button class="btn btn-refresh" onclick="fetchTotals()">↻ Refresh</button>
      <button class="btn btn-clear" onclick="clearVotes()">✕ Clear all votes</button>
    </div>
    <div class="status-msg" id="status"></div>
  </div>
  <script>
    const ORIGIN='__ORIGIN_URL__';
    function updateUI(totals,total){['A','B','C','D'].forEach(o=>{const count=totals[o]||0;const pct=total>0?Math.round(count/total*100):0;document.getElementById('count-'+o).textContent=count;document.getElementById('pct-'+o).textContent=pct+'%';document.getElementById('bar-'+o).style.width=pct+'%';document.getElementById('bar-count-'+o).textContent=count;});document.getElementById('total').textContent=total;}
    async function fetchTotals(){try{const res=await fetch(ORIGIN+'/api/totals');const data=await res.json();updateUI(data.totals,data.total);setStatus('Updated','ok');}catch{setStatus('Failed','err');}}
    async function clearVotes(){if(!confirm('Clear all votes?'))return;try{const res=await fetch(ORIGIN+'/api/clear',{method:'POST'});const data=await res.json();updateUI({A:0,B:0,C:0,D:0},0);setStatus('Cleared '+data.cleared+' tokens','ok');}catch{setStatus('Failed','err');}}
    function setStatus(msg,type){const el=document.getElementById('status');el.textContent=msg;el.className='status-msg '+type;setTimeout(()=>{el.textContent='';el.className='status-msg';},3000);}
    const es=new EventSource(ORIGIN+'/api/events');
    es.onmessage = (e) => {
      try {
        const ev = JSON.parse(e.data);
        if (ev.reset) { updateUI({ A:0, B:0, C:0, D:0 }, 0); return; }
        if (ev.totals) { updateUI(ev.totals, Object.values(ev.totals).reduce((a,b) => a+b, 0)); return; }
        if (ev.option) {
          // Increment locally — no network call needed
          const countEl = document.getElementById('count-' + ev.option);
          if (countEl) {
            const newCount = parseInt(countEl.textContent || '0') + 1;
            const total = parseInt(document.getElementById('total').textContent || '0') + 1;
            // Rebuild totals from current DOM state
            const totals = {};
            ['A','B','C','D'].forEach(o => {
              totals[o] = parseInt(document.getElementById('count-' + o).textContent || '0');
            });
            totals[ev.option] = newCount;
            updateUI(totals, total);
          }
        }
      } catch {}
    };
  </script>
</body>
</html>
