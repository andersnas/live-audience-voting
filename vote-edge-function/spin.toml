spin_manifest_version = 2

[application]
authors = ["Anders Näsman <anasman@akamai.com>"]
description = "Vote handler edge function — validates and forwards votes to SSE server"
name = "vote-edge-function"
version = "0.1.0"

[[trigger.http]]
route = "/..."
component = "vote-edge-function"

[component.vote-edge-function]
source = "dist/vote-edge-function.wasm"
exclude_files = ["**/node_modules"]
allowed_outbound_hosts = ["https://webservices.code4media.com"]

[component.vote-edge-function.build]
command = "npm install && npm run build"
watch = ["src/**/*.ts"]
