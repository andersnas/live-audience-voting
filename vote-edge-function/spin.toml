spin_manifest_version = 2

[application]
authors = ["Maintainer <maintainer@example.com>"]
description = "Vote handler and voter UI edge function"
name = "vote-edge-function"
version = "0.1.0"

# Single component handles all routes
[[trigger.http]]
route = "/voterapp/..."
component = "vote-edge-function"

[component.vote-edge-function]
source = "dist/vote-edge-function.wasm"
exclude_files = ["**/node_modules"]
allowed_outbound_hosts = ["https://{CDN_HOSTNAME}"]
files = [{ source = "static", destination = "/static" }]

[component.vote-edge-function.build]
command = "npm install && npm run build"
watch = ["src/**/*.js"]
