<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live Vote Results</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui, sans-serif;
           height: 100vh; display: flex; flex-direction: column;
           align-items: center; justify-content: center; padding: 2rem; }
    h1 { font-size: 2.5rem; font-weight: 600; margin-bottom: 2rem; }
    #chart-container { width: 100%; max-width: 900px; flex: 1; max-height: 60vh; }
    #total { margin-top: 1.5rem; font-size: 1.1rem; color: #666; }
    #status { position: fixed; bottom: 1rem; right: 1rem; font-size: 0.75rem; color: #444; }
    #status.connected { color: #2a9d5c; }
    #status.error { color: #e24b4a; }
  </style>
</head>
<body>
  <h1>Live Vote</h1>
  <div id="chart-container"><canvas id="chart"></canvas></div>
  <div id="total">0 votes</div>
  <div id="status">Connecting...</div>
  <script>
    const SSE_URL = window.SSE_URL || "http://localhost:3000";
    const OPTIONS = ["A","B","C","D"];
    const LABELS  = ["Option A","Option B","Option C","Option D"];
    const COLORS  = ["#5b8dee","#e8593c","#1d9e75","#ef9f27"];
    const tally   = { A:0, B:0, C:0, D:0 };

    const chart = new Chart(document.getElementById("chart").getContext("2d"), {
      type: "bar",
      data: { labels: LABELS, datasets: [{ data: OPTIONS.map(o => tally[o]),
        backgroundColor: COLORS, borderRadius: 8, borderSkipped: false }] },
      options: { responsive: true, maintainAspectRatio: false,
        animation: { duration: 300 }, plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: "#222" }, ticks: { color: "#aaa", font: { size: 18, weight: "600" } } },
          y: { beginAtZero: true, grid: { color: "#222" }, ticks: { color: "#aaa", precision: 0 } }
        }
      }
    });

    function updateChart() {
      chart.data.datasets[0].data = OPTIONS.map(o => tally[o]);
      chart.update();
      const total = Object.values(tally).reduce((a,b) => a+b, 0);
      document.getElementById("total").textContent = `${total} vote${total !== 1 ? "s" : ""}`;
    }

    const statusEl = document.getElementById("status");
    function connect() {
      const es = new EventSource(SSE_URL);
      es.onopen = () => { statusEl.textContent = "● Live"; statusEl.className = "connected"; };
      es.onmessage = (e) => {
        try {
          const event = JSON.parse(e.data);
          if (event.option && tally.hasOwnProperty(event.option)) { tally[event.option]++; updateChart(); }
        } catch {}
      };
      es.onerror = () => { statusEl.textContent = "● Reconnecting..."; statusEl.className = "error"; es.close(); setTimeout(connect, 3000); };
    }
    connect();
  </script>
</body>
</html>
